rules:
- id: vibe-fw-django-raw-sql
  message: '[VIBE-SEC][framework] Django raw SQL concatenation / extra(where=) risks.
    KB: languages/python/django-security.md'
  severity: ERROR
  languages:
  - python
  pattern-either:
  - pattern: cursor.execute(f"...")
  - pattern: cursor.execute(... % ...)
  - pattern: .$M.raw(f"...")
  - pattern: .$M.extra(where=[...])
  metadata:
    cwe: CWE-89
    kb_path: languages/python/django-security.md
    framework: django
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
    - '**/node_modules/**'
    - '**/.venv/**'
    - '**/venv/**'
    - '**/vendor/**'
    - '**/*_test.py'
    - '**/*_test.go'
    - '**/__tests__/**'
- id: vibe-fw-django-mark-safe
  message: '[VIBE-SEC][framework] mark_safe on dynamic content → XSS. KB: languages/python/django-security.md'
  severity: ERROR
  languages:
  - python
  pattern: mark_safe(...)
  metadata:
    cwe: CWE-79
    framework: django
  paths:
    exclude:
