rules:
- id: vibe-dangerous-eval-python
  message: '[VIBE-SEC][builtin] eval/exec'
  severity: ERROR
  languages:
  - python
  pattern-either:
  - pattern: eval(...)
  - pattern: exec(...)
  metadata:
    cwe: CWE-95
    builtin: true
  paths:
    exclude:
    - '**/test/**'
    - '**/tests/**'
    - '**/node_modules/**'
    - '**/.venv/**'
    - '**/venv/**'
    - '**/vendor/**'
    - '**/*_test.py'
    - '**/*_test.go'
    - '**/__tests__/**'
